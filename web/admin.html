<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back'n Score - Admin Panel</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #00adb5;
            --accent-color: #393e46;
            --text-color: #eeeeee;
            --move-color: #9c27b0;
            --danger-color: #b00020;
            --selected-bg: #2a3a40;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        h1 { margin: 0; font-size: 1.2rem; }
        .subtitle { margin: 0; color: #888; font-size: 0.8rem; display: inline-block; margin-left: 10px; }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-move { background-color: var(--move-color); }
        .btn-danger { background-color: var(--danger-color); }
        .btn-secondary { background-color: var(--accent-color); color: var(--text-color); }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        /* Groupe Input + Bouton d'exploration */
        .input-browse-group {
            display: flex;
            gap: 4px;
        }
        .btn-browse {
            background-color: var(--accent-color);
            color: #ffb400;
            border: 1px solid #555;
            padding: 0 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Formulaires CRUD */
        .crud-container { display: block; }
        .crud-card {
            background-color: var(--surface-color);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary-color);
        }
        .crud-card.card-move { border-left-color: var(--move-color); }
        .crud-card.card-delete { border-left-color: var(--danger-color); }

        .crud-title {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .form-group { flex: 1; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 2px; }
        
        input[type="text"] {
            width: 100%;
            padding: 7px 9px;
            background-color: #252525;
            border: 1px solid var(--accent-color);
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.85rem;
        }
        input[type="text"]:focus { border-color: var(--primary-color); outline: none; }
        .card-move input[type="text"]:focus { border-color: var(--move-color); }

        .action-zone {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
        }

        /* FENÊTRE MODALE (POP-UP) POUR L'ARBRE */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            padding: 15px;
            box-sizing: border-box;
        }
        .modal-content {
            background-color: #181818;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 85%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .modal-header {
            padding: 10px;
            border-bottom: 1px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { margin: 0; font-size: 1rem; color: var(--primary-color); }
        .btn-close-modal {
            background: none; border: none; color: #888; font-size: 1.2rem; cursor: pointer;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.95rem;
        }
        .modal-body ul { list-style-type: none; padding-left: 15px; margin: 0; }
        .modal-body li { margin: 6px 0; position: relative; }
        
        /* Conteneur de ligne pour aligner proprement la flèche et la zone sélectionnable */
        .tree-row {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .selectable-path { 
            cursor: pointer; 
            padding: 4px 8px; 
            border-radius: 4px; 
            display: inline-block;
        }
        .selectable-path:hover { background-color: var(--accent-color); }
        
        /* Style pour l'élément actuellement sélectionné dans la modale */
        .selectable-path.active-selection {
            background-color: var(--selected-bg) !important;
            outline: 1px solid var(--primary-color);
        }

        .folder-node { color: #ffb400; font-weight: bold; }
        .track-node { color: #ffffff; }

        /* Flèche d'état pour les dossiers rétractables */
        .folder-toggle {
            cursor: pointer;
            font-size: 0.75rem;
            display: inline-block;
            width: 20px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            color: #888;
            transition: transform 0.2s;
            user-select: none;
        }
        .folder-toggle:hover { color: white; }
        
        /* Espaceur pour aligner les morceaux (qui n'ont pas de flèche) avec les dossiers */
        .track-spacer {
            display: inline-block;
            width: 20px;
        }

        /* Gestion CSS de l'ouverture/fermeture des branches */
        .folder-branch > ul {
            display: none;
        }
        .folder-branch.expanded > ul {
            display: block;
        }
        .folder-branch.expanded > .tree-row > .folder-toggle {
            transform: rotate(90deg);
        }

        /* Pied de la modale contenant les boutons de validation */
        .modal-footer {
            padding: 10px;
            border-top: 1px solid var(--accent-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background-color: #151515;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Back'n Score <span class="subtitle">Configuration DB</span></h1>
        </div>
        <button id="btn-refresh" class="btn" onclick="triggerRefresh()">🔄 Indexer la DB</button>
    </header>

    <main class="crud-container">
            
        <section class="crud-card">
            <div class="crud-title" style="color: var(--primary-color);">➕ Ajouter un morceau</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Dossier Parent</label>
                    <div class="input-browse-group">
                        <input type="text" id="create-location" placeholder="Sélectionnez le dossier parent...">
                        <button class="btn-browse" onclick="openTreeModal('create-location', true)">📁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Nom du nouveau morceau (trackname)</label>
                    <input type="text" id="create-title" placeholder="Ex: Reggae Blues">
                </div>
            </div>
            <div class="action-zone">
                <button class="btn" onclick="actionCreate()">Créer le morceau</button>
            </div>
        </section>

        <section class="crud-card card-move">
            <div class="crud-title" style="color: var(--move-color);">📦 Déplacer un dossier / morceau</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Élément à déplacer</label>
                    <div class="input-browse-group">
                        <input type="text" id="move-location" placeholder="Sélectionnez la source...">
                        <button class="btn-browse" onclick="openTreeModal('move-location', false)">📁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Nouvel Emplacement cible (Dossier Parent de destination)</label>
                    <div class="input-browse-group">
                        <input type="text" id="move-new-location" placeholder="Sélectionnez la destination...">
                        <button class="btn-browse" onclick="openTreeModal('move-new-location', true)">📁</button>
                    </div>
                </div>
            </div>
            <div class="action-zone">
                <button class="btn btn-move" onclick="actionMove()">Valider le déplacement</button>
            </div>
        </section>

        <section class="crud-card" style="border-left-color: #ffb400;">
            <div class="crud-title" style="color: #ffb400;">✏️ Modifier un titre</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Morceau ciblé</label>
                    <div class="input-browse-group">
                        <input type="text" id="update-location" placeholder="Sélectionnez le morceau...">
                        <button class="btn-browse" onclick="openTreeModal('update-location', false)">📁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Nouveau titre réel</label>
                    <input type="text" id="update-title" placeholder="Ex: Titre Corrigé (Live)">
                </div>
            </div>
            <div class="action-zone">
                <button class="btn" style="background-color: #ffb400; color: #121212;" onclick="actionUpdate()">Renommer</button>
            </div>
        </section>

        <section class="crud-card card-delete">
            <div class="crud-title" style="color: var(--danger-color);">❌ Supprimer un dossier / morceau</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Cible à effacer</label>
                    <div class="input-browse-group">
                        <input type="text" id="delete-location" placeholder="Sélectionnez la cible...">
                        <button class="btn-browse" onclick="openTreeModal('delete-location', false)">📁</button>
                    </div>
                </div>
                <button class="btn btn-danger" style="margin-top: 15px;" onclick="actionDelete()">Supprimer</button>
            </div>
        </section>

    </main>

    <div id="tree-modal" class="modal-overlay" onclick="hideModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title-text">Explorateur de Bibliothèque</h3>
                <button class="btn-close-modal" onclick="hideModal()">✕</button>
            </div>
            <div id="modal-tree-body" class="modal-body">
                <p style="color: #888; margin: 0;">Chargement...</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideModal()">Annuler (ESC)</button>
                <button id="modal-btn-confirm" class="btn" onclick="confirmModalSelection()">Sélectionner (OK)</button>
            </div>
        </div>
    </div>

    <script>
        var API_REFRESH_URL = '/api/admin/refresh';
        var API_TREE_URL = '/server_data/db_tracks.json';
        var API_CRUD_URL = '/api/admin/crud';

        var activeTargetInputId = null;
        var foldersOnlyMode = false;
        var cachedRawData = null;
        
        var currentPendingSelection = null; 

        function makeRequest(method, url, dataToSend, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open(method, url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var data = null;
                        try { data = JSON.parse(xhr.responseText); } catch (e) { data = xhr.responseText; }
                        callback(null, data);
                    } else {
                        callback(new Error("HTTP Error: " + xhr.status), null);
                    }
                }
            };
            xhr.send(dataToSend ? JSON.stringify(dataToSend) : null);
        }

        function parseFlatListToTree(flatList) {
            var root = { name: "Root", type: "folder", path: "", children: [] };
            for (var i = 0; i < flatList.length; i++) {
                var item = flatList[i];
                var parts = item.location.split('/');
                var currentLevel = root.children;
                var currentPath = "";

                for (var j = 0; j < parts.length; j++) {
                    var partName = parts[j];
                    currentPath = currentPath ? currentPath + "/" + partName : partName;
                    var isLast = (j === parts.length - 1);
                    var found = null;

                    for (var k = 0; k < currentLevel.length; k++) {
                        if (currentLevel[k].name === partName && currentLevel[k].type === "folder") {
                            found = currentLevel[k];
                            break;
                        }
                    }

                    if (isLast) {
                        currentLevel.push({ name: partName, title: item.title, path: item.location, type: "track" });
                    } else {
                        if (!found) {
                            found = { name: partName, type: "folder", path: currentPath, children: [] };
                            currentLevel.push(found);
                        }
                        currentLevel = found.children;
                    }
                }
            }
            return root.children;
        }

        function clearVisualSelection() {
            var selectedElements = document.querySelectorAll('.active-selection');
            for (var i = 0; i < selectedElements.length; i++) {
                selectedElements[i].classList.remove('active-selection');
            }
        }

        function renderTreeDOM(nodes) {
            var ul = document.createElement('ul');
            for (var i = 0; i < nodes.length; i++) {
                var item = nodes[i];
                
                if (item.type === 'folder') {
                    var li = document.createElement('li');
                    li.className = "folder-branch";
                    
                    // Conteneur de ligne pour isoler la flèche du bouton cliquable
                    var rowDiv = document.createElement('div');
                    rowDiv.className = "tree-row";
                    
                    var toggleSpan = document.createElement('span');
                    toggleSpan.className = "folder-toggle";
                    toggleSpan.innerHTML = "▶";
                    
                    // Clic sur la flèche : ouvre/ferme sans impacter la sélection
                    toggleSpan.onclick = (function(targetLi) {
                        return function(e) {
                            targetLi.classList.toggle('expanded');
                        };
                    })(li);

                    rowDiv.appendChild(toggleSpan);
                    
                    // Zone cliquable pour la sélection du dossier (flèche exclue)
                    var folderSpan = document.createElement('span');
                    folderSpan.className = "selectable-path folder-node";
                    folderSpan.innerHTML = "📁 " + item.name;
                    
                    folderSpan.onclick = (function(spanEl, path) {
                        return function(e) {
                            clearVisualSelection();
                            spanEl.classList.add('active-selection');
                            currentPendingSelection = path;
                        };
                    })(folderSpan, item.path);

                    rowDiv.appendChild(folderSpan);
                    li.appendChild(rowDiv);

                    if (item.children && item.children.length > 0) {
                        li.appendChild(renderTreeDOM(item.children));
                    }
                    ul.appendChild(li);
                } else {
                    if (!foldersOnlyMode) {
                        var li = document.createElement('li');
                        
                        var rowDiv = document.createElement('div');
                        rowDiv.className = "tree-row";
                        
                        // Un espaceur pour aligner le morceau avec le texte des dossiers
                        var spacer = document.createElement('span');
                        spacer.className = "track-spacer";
                        rowDiv.appendChild(spacer);
                        
                        var trackSpan = document.createElement('span');
                        trackSpan.className = "selectable-path track-node";
                        trackSpan.innerHTML = "🎵 " + item.title;
                        
                        trackSpan.onclick = (function(spanEl, path) {
                            return function(e) {
                                clearVisualSelection();
                                spanEl.classList.add('active-selection');
                                currentPendingSelection = path;
                            };
                        })(trackSpan, item.path);

                        rowDiv.appendChild(trackSpan);
                        li.appendChild(rowDiv);
                        ul.appendChild(li);
                    }
                }
            }
            return ul;
        }

        function openTreeModal(targetInputId, foldersOnly) {
            activeTargetInputId = targetInputId;
            foldersOnlyMode = foldersOnly;
            currentPendingSelection = null; 
            
            var modal = document.getElementById('tree-modal');
            var titleText = document.getElementById('modal-title-text');
            
            titleText.innerHTML = foldersOnly ? "Sélectionner un dossier" : "Sélectionner un élément";
            modal.style.display = "block";

            if (cachedRawData) {
                renderModalTree(cachedRawData);
            } else {
                fetchAndRenderTree();
            }
        }

        function hideModal() {
            document.getElementById('tree-modal').style.display = "none";
        }

        function confirmModalSelection() {
            if (currentPendingSelection !== null && activeTargetInputId) {
                document.getElementById(activeTargetInputId).value = currentPendingSelection;
                hideModal();
            } else {
                alert("Veuillez d'abord sélectionner un élément dans l'arbre.");
            }
        }

        function fetchAndRenderTree() {
            var bodyContainer = document.getElementById('modal-tree-body');
            bodyContainer.innerHTML = "<p style='color: #888; margin: 0;'>Chargement du disque...</p>";
            
            makeRequest('GET', API_TREE_URL, null, function (err, flatData) {
                if (!err && flatData && flatData.length > 0) {
                    cachedRawData = flatData;
                    renderModalTree(flatData);
                } else {
                    bodyContainer.innerHTML = "<p style='color:#ff6b6b; margin:0;'>Index vide ou introuvable.</p>";
                }
            });
        }

        function renderModalTree(flatData) {
            var bodyContainer = document.getElementById('modal-tree-body');
            bodyContainer.innerHTML = "";
            var treeStructure = parseFlatListToTree(flatData);
            bodyContainer.appendChild(renderTreeDOM(treeStructure));
        }

        function triggerRefresh() {
            var btn = document.getElementById('btn-refresh');
            btn.disabled = true; btn.innerHTML = "⏳ Indexation...";
            makeRequest('POST', API_REFRESH_URL, {}, function (err, data) {
                if (!err) {
                    alert("Indexation terminée avec succès !");
                } else {
                    alert("Erreur lors de l'indexation.");
                }
                btn.disabled = false; btn.innerHTML = "🔄 Indexer la DB";
            });
        }

        function convertToCamelCase(str) {
            if (!str) return "";
            var accents = "ÀÁÂÃÄÅ📂🎒ÆÇÈÉÊËÌÍÎÏÐÑÒÓÔÕÖØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõöøùúûüýþÿ";
            var sansAccents = "AAAAAAAECEEEEIIIIDNOOOOOOUUUUYbBaaaaaaaeceeeeiiiidnoooooouuuuyby";
            var cleanStr = "";
            for (var i = 0; i < str.length; i++) {
                var c = str.charAt(i);
                var index = accents.indexOf(c);
                if (index !== -1) {
                    cleanStr += sansAccents.charAt(index);
                } else {
                    cleanStr += c;
                }
            }

            var words = cleanStr.split(/[^a-zA-Z0-9]/);
            var camelCaseResult = "";
            var isFirstWordFound = false;

            for (var j = 0; j < words.length; j++) {
                var word = words[j];
                if (word.length === 0) continue;

                if (!isFirstWordFound) {
                    camelCaseResult += word.toLowerCase();
                    isFirstWordFound = true;
                } else {
                    camelCaseResult += word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                }
            }
            return camelCaseResult;
        }

        function actionCreate() {
            var loc = document.getElementById('create-location').value;
            var title = document.getElementById('create-title').value;
            if (!loc || !title) { alert("Champs manquants."); return; }
            
            // On conserve l'intitulé exact saisi par l'utilisateur
            var cleanDirName = title.trim();
            var fullLocation = loc + '/' + cleanDirName;

            var params = { action: 'create', location: fullLocation, title: title };
            alert("DEBUG - Requête [CREATE] prête :\n" + JSON.stringify(params, null, 4));

            makeRequest('POST', API_CRUD_URL, params, function(err, res) {
                if (!err && res.status === "success") { 
                    alert("Succès serveur : Morceau créé !");
                    document.getElementById('create-title').value = "";
                    document.getElementById('create-location').value = "";
                    cachedRawData = null;
                } else {
                    alert("Erreur serveur lors de la création.");
                }
            });
        }

        function actionMove() {
            var loc = document.getElementById('move-location').value;
            var newParentLoc = document.getElementById('move-new-location').value;
            if (!loc || !newParentLoc) { alert("Champs manquants."); return; }

            var parts = loc.split('/');
            var elementName = parts[parts.length - 1];
            var fullDestination = newParentLoc + '/' + elementName;

            var params = { action: 'update', location: loc, new_location: fullDestination };
            alert("DEBUG - Requête [MOVE] prête :\n" + JSON.stringify(params, null, 4));

            makeRequest('POST', API_CRUD_URL, params, function(err, res) {
                if (!err && res.status === "success") { 
                    alert("Succès serveur : Élément déplacé !");
                    document.getElementById('move-location').value = "";
                    document.getElementById('move-new-location').value = "";
                    cachedRawData = null;
                } else {
                    alert("Erreur serveur lors du déplacement.");
                }
            });
        }

        function actionUpdate() {
            var loc = document.getElementById('update-location').value;
            var newTitle = document.getElementById('update-title').value;
            if (!loc || !newTitle) { alert("Champs manquants."); return; }

            var params = { action: 'update', location: loc, new_title: newTitle };
            alert("DEBUG - Requête [UPDATE TITLE] prête :\n" + JSON.stringify(params, null, 4));

            makeRequest('POST', API_CRUD_URL, params, function(err, res) {
                if (!err && res.status === "success") { 
                    alert("Succès serveur : Titre et dossier mis à jour !");
                    document.getElementById('update-title').value = "";
                    document.getElementById('update-location').value = "";
                    cachedRawData = null;
                } else {
                    alert("Erreur serveur lors de la mise à jour du titre.");
                }
            });
        }

        function actionDelete() {
            var loc = document.getElementById('delete-location').value;
            if (!loc) { alert("Indiquez un chemin."); return; }
            
            var params = { action: 'delete', location: loc };
            alert("DEBUG - Requête [DELETE] prête :\n" + JSON.stringify(params, null, 4));

            if (confirm("Supprimer définitivement :\n" + loc + " ?")) {
                makeRequest('POST', API_CRUD_URL, params, function(err, res) {
                    if (!err && res.status === "success") { 
                        alert("Succès serveur : Élément supprimé !");
                        document.getElementById('delete-location').value = "";
                        cachedRawData = null;
                    } else {
                        alert("Erreur serveur lors de la suppression.");
                    }
                });
            }
        }
    </script>
</body>
</html>
