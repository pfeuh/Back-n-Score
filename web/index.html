<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Back'n Score</title>
    <style>
        /* On force le html et le body à prendre toute la place sans marges */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* Le conteneur occupe 100% du parent (donc de l'écran) */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            /* Version compatible Android 4 pour le fond */
            background-image: url('/static/img/splash.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            -webkit-background-size: contain; /* 'contain' pour voir TOUTE l'image sans rognage */
            background-size: contain; 
        }

        /* Le menu centré au milieu de l'écran avec une méthode "Old School" */
        .menu {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            margin-left: -150px; /* Moitié de la largeur */
            margin-top: -80px;   /* Ajustement manuel pour le centrage vertical */
            text-align: center;
            z-index: 100;
        }

        .btn {
            display: block;
            padding: 15px 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: #ffffff;
            background: #222222; /* Pas de transparence RGBA pour Android 4, on reste simple */
            border: 2px solid #555555;
            border-radius: 10px;
            font-family: sans-serif;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 2px 2px 10px #000;
        }

        .btn-chef {
            border-color: #ffca28;
            color: #ffca28;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="menu">
            <a href="/qrcode" class="btn">QR Codes</a>
            <a href="/pupitre" class="btn">Pupitre</a>
            <a href="/training" class="btn">Entrainement à la maison</a>
            <a href="/admin" class="btn">Administration</a>
        </div>
    </div>

</body>
</html>
